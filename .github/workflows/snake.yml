name: Generate GitHub Contribution Snake

on:
  # 每12小时自动运行一次
  schedule:
    - cron: "0 */12 * * *"
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 生成蛇形动画 (GIF 动态效果，恢复默认格子颜色)
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.gif?color_snake=#00D4AA
            dist/github-contribution-grid-snake-dark.gif?palette=github-dark&color_snake=#00D4AA

      # 将生成的文件推送到 output 分支
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
